# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# IDE Gradle settings may override values here.
# https://docs.gradle.org/current/userguide/build_environment.html

# --- JVM ---
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# --- 性能（大型多模块常用）---
org.gradle.parallel=true
org.gradle.caching=true

# Configuration Cache：可显著加速配置阶段；若某插件不兼容可改为 false
org.gradle.configuration-cache=true

# --- Android ---
android.useAndroidX=true
android.nonTransitiveRClass=true
# CC 等旧 AAR 仍依赖 com.android.support，需 Jetifier 转为 AndroidX
android.enableJetifier=true
# kapt（ARouter）与 AGP 内置 Kotlin 不兼容：关闭内置 Kotlin 并暂时使用旧 DSL（见 kapt 报错提示）
android.builtInKotlin=false
android.newDsl=false
# Kotlin 代码风格
kotlin.code.style=official
